name: geo_entities_app
description: Smart Geo-Tagged Landmarks mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  image_picker: ^1.0.7
  location: ^7.0.0
  image: ^4.2.0
  path_provider: ^2.1.4
  path: ^1.9.0
  sqflite: ^2.3.3+1
  connectivity_plus: ^6.0.5
  intl: ^0.19.0

  # Replaced flutter_map + latlong2 with google_maps_flutter
  google_maps_flutter: ^2.12.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
